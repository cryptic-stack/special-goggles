server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: gnusocial-next-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gnusocial}
    username: ${DATABASE_USER:gnusocial}
    password: ${DATABASE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  base-url: ${APP_BASE_URL:http://localhost}
  domain: ${APP_DOMAIN:localhost}
  require-https: ${APP_REQUIRE_HTTPS:false}