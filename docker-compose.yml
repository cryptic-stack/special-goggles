services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: social
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    volumes:
      - apdata:/data

volumes:
  pgdata:
  apdata:

